<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Your Trip</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      margin: 0;
      background-color: white;
    }

    h1 {
      font-size: 50px;
      text-align: center;
      padding: 40px;
      color: black;
    }

    h3 {
      text-align: center;
      font-size: 30px;
      color: black;
      padding: 10px;
    }

    .header,
    .footer {
      background-color: black;
      color: white;
      padding: 10px 40px;
    }

    .header p,
    .footer p {
      margin: 0;
      font-size: 20px;
      text-align: center;
    }

    .plans {
      display: flex;
      justify-content: center;
      padding-bottom: 80px;
      gap: 20px;
    }

    .plans button {
      padding: 20px 40px;
      border-radius: 5px;
      border: 2px groove #ccc;
      font-size: 20px;
      cursor: pointer;
      background-color: white;
    }

    .form-container {
      display: flex;
      justify-content: center;
      margin-bottom: 100px;
    }

    .form-box {
      background-color: dimgray;
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      color: white;
      text-align: left;
    }

    .form-box label {
      display: block;
      margin-top: 15px;
      font-size: 18px;
    }

    .form-box input {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-top: 5px;
      font-size: 16px;
    }

    .form-box button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }

    .socials {
      display: flex;
      gap: 20px;
      margin-top: 10px;
      align-items: center;
    }

    .socials a {
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      font-size: 16px;
    }

    .socials img {
      height: 22px;
      width: 22px;
      margin-right: 8px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 30px 40px;
    }
  </style>
</head>

<body>

  <div class="header">
    <p>Pine</p>
    <p>Tour.</p>
  </div>

  <h1>Order Your Trip</h1>
  <h3>Choose Your Plan</h3>

  <div class="plans">
    <button>Starter Pack</button>
    <button>Luxury Pack</button>
  </div>

  <h3>Contact Information</h3>

  <div class="form-container">
    <div class="form-box">
      <form onsubmit="alert('Order submitted!'); return false;">
        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" required>

        <label for="password">Password</label>
        <input type="password" id="password" required>

        <button type="submit">Sign</button>
      </form>
    </div>
  </div>

  <div class="footer">
    <div>
      <p>Pine</p>
      <p>Tour.</p>
    </div>
    <div class="socials">
      <a href="https://www.facebook.com/">
        <img src="./download.png" alt="Facebook"> Facebook
      </a>
      <a href="https://www.instagram.com/">
        <img src="./download.jpeg" alt="Instagram"> Instagram
      </a>
    </div>
  </div>

</body>

</html>
